<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local Ollama Assistant</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --user: #3d5a80;
      --assistant: #1e2d3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1rem;
      background: var(--surface);
    }
    header h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header label { font-size: 0.8rem; color: var(--muted); }
    select, button, textarea {
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    select { padding: 0.35rem 0.5rem; min-width: 10rem; }
    button {
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      background: var(--accent);
      border-color: transparent;
      color: #0a0e14;
      font-weight: 600;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
      font-weight: 500;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 52rem;
      margin: 0 auto;
      width: 100%;
      padding: 1rem 1.25rem 1.5rem;
      gap: 0.75rem;
    }
    #log {
      flex: 1;
      min-height: 12rem;
      max-height: min(55vh, 28rem);
      overflow-y: auto;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      font-size: 0.92rem;
      line-height: 1.45;
    }
    .msg { margin-bottom: 0.85rem; }
    .msg .role {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .msg .bubble {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { background: var(--user); }
    .msg.assistant .bubble { background: var(--assistant); border: 1px solid var(--border); }
    .msg.system .bubble { background: #2a2520; border: 1px dashed var(--border); font-size: 0.88rem; }
    #composer {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    #composer textarea {
      width: 100%;
      min-height: 4.5rem;
      padding: 0.65rem 0.75rem;
      resize: vertical;
    }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    #status { font-size: 0.8rem; color: var(--muted); min-height: 1.2em; }
    .err { color: #f0a0a0; }
    details.adv {
      font-size: 0.85rem;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.65rem;
      background: var(--surface);
    }
    details.adv summary { cursor: pointer; color: var(--text); font-weight: 500; }
    details.adv .adv-inner { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.45rem; }
    details.adv label.opt { display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; }
    details.adv input[type="number"] {
      width: 6rem;
      font: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.4rem;
    }
    #schemaBox { display: none; flex-direction: column; gap: 0.35rem; }
    #schemaBox.visible { display: flex; }
    #schema {
      width: 100%;
      min-height: 6rem;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      padding: 0.5rem;
      resize: vertical;
    }
  </style>
</head>
<body>
  <header>
    <h1>Local Ollama Assistant</h1>
    <label>Model
      <select id="model" title="Ollama model"></select>
    </label>
    <button type="button" class="secondary" id="refresh" title="Reload model list">Refresh models</button>
  </header>
  <main>
    <div id="log" aria-live="polite"></div>
    <p id="status"></p>
    <details class="adv" id="adv">
      <summary>Structured output &amp; generation options</summary>
      <div class="adv-inner">
        <div class="row" style="flex-direction: column; align-items: flex-start;">
          <span style="font-size:0.78rem; color: var(--muted);">Response shape (Ollama <code>format</code>)</span>
          <label class="opt"><input type="radio" name="outfmt" value="free" checked /> Free-form text</label>
          <label class="opt"><input type="radio" name="outfmt" value="json" /> JSON (any object)</label>
          <label class="opt"><input type="radio" name="outfmt" value="schema" /> JSON Schema (structured)</label>
        </div>
        <div id="schemaBox">
          <span style="font-size:0.78rem;">Schema object (must parse as JSON; requires a model that supports structured outputs)</span>
          <textarea id="schema" spellcheck="false" aria-label="JSON Schema">{
  "type": "object",
  "properties": {
    "summary": { "type": "string" },
    "sentiment": { "type": "string", "enum": ["positive", "neutral", "negative"] }
  },
  "required": ["summary", "sentiment"]
}</textarea>
        </div>
        <div class="row" style="gap: 1rem; flex-wrap: wrap;">
          <label class="opt">Temperature <input type="number" id="temperature" step="0.1" min="0" max="2" placeholder="(default)" title="Ollama default if empty" /></label>
          <label class="opt">Seed <input type="number" id="seed" step="1" placeholder="(random)" title="Set for reproducible sampling" /></label>
          <label class="opt">Max validate retries <input type="number" id="maxValAttempts" min="1" max="12" value="3" title="JSON / schema modes: parse + schema check; retry with feedback (server-side)" /></label>
        </div>
      </div>
    </details>
    <div id="composer">
      <textarea id="input" placeholder="Message… (Enter to send, Shift+Enter for newline)" rows="3"></textarea>
      <div class="row">
        <button type="button" id="send">Send</button>
        <button type="button" class="secondary" id="clear">Clear chat</button>
      </div>
    </div>
  </main>
  <script>
    const modelEl = document.getElementById("model");
    const logEl = document.getElementById("log");
    const statusEl = document.getElementById("status");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const clearBtn = document.getElementById("clear");
    const refreshBtn = document.getElementById("refresh");
    const schemaBox = document.getElementById("schemaBox");
    const schemaEl = document.getElementById("schema");
    const temperatureEl = document.getElementById("temperature");
    const seedEl = document.getElementById("seed");
    const maxValAttemptsEl = document.getElementById("maxValAttempts");

    /** @type {{ role: string, content: string }[]} */
    let messages = [];

    function syncSchemaVisibility() {
      const mode = document.querySelector('input[name="outfmt"]:checked')?.value || "free";
      schemaBox.classList.toggle("visible", mode === "schema");
    }
    document.querySelectorAll('input[name="outfmt"]').forEach((el) => {
      el.addEventListener("change", syncSchemaVisibility);
    });
    syncSchemaVisibility();

    function setStatus(text, isErr) {
      statusEl.textContent = text || "";
      statusEl.className = isErr ? "err" : "";
    }

    async function parseHttpError(res) {
      const t = await res.text();
      try {
        const j = JSON.parse(t);
        if (typeof j.detail === "string") return j.detail;
        if (Array.isArray(j.detail)) {
          return j.detail.map((x) => (x.msg ? x.msg : JSON.stringify(x))).join("; ");
        }
      } catch {
        /* not JSON */
      }
      return t || res.statusText;
    }

    function rollbackPendingSend() {
      messages.pop();
      for (let i = 0; i < 2; i++) {
        const last = logEl.querySelector(".msg:last-child");
        if (last) last.remove();
      }
    }

    function appendMessage(role, content) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;
      const r = document.createElement("div");
      r.className = "role";
      r.textContent = role;
      const b = document.createElement("div");
      b.className = "bubble";
      b.textContent = content;
      wrap.appendChild(r);
      wrap.appendChild(b);
      logEl.appendChild(wrap);
      logEl.scrollTop = logEl.scrollHeight;
      return b;
    }

    function renderHistory() {
      logEl.innerHTML = "";
      for (const m of messages) {
        appendMessage(m.role, m.content);
      }
    }

    async function loadModels() {
      setStatus("Loading models…");
      try {
        const hr = await fetch("/api/health");
        let ollamaHint = "";
        if (hr.ok) {
          const h = await hr.json();
          if (h.ollama_reachable === false) {
            ollamaHint =
              ` Ollama at ${h.ollama_base} is not reachable (${h.ollama_error || "unknown error"}). ` +
              "Start the Ollama app, then click Refresh models.";
          }
        }
        const r = await fetch("/api/models");
        if (!r.ok) {
          const detail = await parseHttpError(r);
          const msg = ollamaHint ? `${detail} ${ollamaHint}` : detail;
          throw new Error(msg.trim());
        }
        const data = await r.json();
        const names = data.models || [];
        modelEl.innerHTML = "";
        for (const n of names) {
          const o = document.createElement("option");
          o.value = n;
          o.textContent = n;
          modelEl.appendChild(o);
        }
        if (!names.length) {
          const o = document.createElement("option");
          o.value = "";
          o.textContent = "No models — run ollama pull";
          modelEl.appendChild(o);
        }
        setStatus("");
      } catch (e) {
        setStatus("Models: " + e, true);
      }
    }

    async function streamChat() {
      const model = modelEl.value;
      if (!model) {
        setStatus("Pick a model first.", true);
        return;
      }
      const text = inputEl.value.trim();
      if (!text) return;

      messages.push({ role: "user", content: text });
      inputEl.value = "";
      appendMessage("user", text);

      const assistantBubble = appendMessage("assistant", "");
      sendBtn.disabled = true;
      setStatus("Generating…");

      const body = { model, messages: messages.map((m) => ({ role: m.role, content: m.content })) };

      const outMode = document.querySelector('input[name="outfmt"]:checked')?.value || "free";
      if (outMode === "json") {
        body.format = "json";
      } else if (outMode === "schema") {
        try {
          const parsed = JSON.parse(schemaEl.value.trim() || "{}");
          if (parsed === null || typeof parsed !== "object" || Array.isArray(parsed)) {
            throw new Error("Schema must be a JSON object");
          }
          body.format = parsed;
        } catch (e) {
          setStatus("Schema JSON: " + e, true);
          sendBtn.disabled = false;
          rollbackPendingSend();
          return;
        }
      }

      const opts = {};
      const tVal = temperatureEl.value.trim();
      if (tVal !== "") {
        const t = Number(tVal);
        if (!Number.isFinite(t)) {
          setStatus("Temperature must be a number.", true);
          sendBtn.disabled = false;
          rollbackPendingSend();
          return;
        }
        opts.temperature = t;
      }
      const sVal = seedEl.value.trim();
      if (sVal !== "") {
        const s = Number(sVal);
        if (!Number.isInteger(s)) {
          setStatus("Seed must be an integer.", true);
          sendBtn.disabled = false;
          rollbackPendingSend();
          return;
        }
        opts.seed = s;
      }
      if (Object.keys(opts).length) body.options = opts;

      if (outMode === "json" || outMode === "schema") {
        const m = Number(maxValAttemptsEl.value);
        if (!Number.isInteger(m) || m < 1 || m > 12) {
          setStatus("Max validate retries must be an integer 1–12.", true);
          sendBtn.disabled = false;
          rollbackPendingSend();
          return;
        }
        body.max_validation_attempts = m;
      }

      try {
        const res = await fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const t = await res.text();
          throw new Error(t || res.statusText);
        }
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        let full = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split("\n");
          buf = lines.pop() || "";
          for (const line of lines) {
            const s = line.trim();
            if (!s) continue;
            let j;
            try {
              j = JSON.parse(s);
            } catch {
              continue;
            }
            if (j.error) {
              const a = j.validation_attempts;
              throw new Error(a ? `${j.error} (attempts: ${a})` : j.error);
            }
            const piece = j.message && j.message.content;
            if (piece) {
              full += piece;
              assistantBubble.textContent = full;
              logEl.scrollTop = logEl.scrollHeight;
            }
            if (j.done) {
              messages.push({ role: "assistant", content: full });
              if (outMode === "json" || outMode === "schema") {
                try {
                  const parsed = JSON.parse(full);
                  assistantBubble.textContent = JSON.stringify(parsed, null, 2);
                } catch {
                  /* keep raw if model wrapped or invalid */
                }
              }
              const va = j.validation_attempts;
              setStatus(va ? `OK (validated, ${va} attempt${va === 1 ? "" : "s"})` : "");
              sendBtn.disabled = false;
              return;
            }
          }
        }
        if (full) messages.push({ role: "assistant", content: full });
        setStatus("");
      } catch (e) {
        setStatus(String(e), true);
        assistantBubble.textContent = "(error — see status)";
      } finally {
        sendBtn.disabled = false;
      }
    }

    clearBtn.addEventListener("click", () => {
      messages = [];
      logEl.innerHTML = "";
      setStatus("");
    });
    refreshBtn.addEventListener("click", loadModels);
    sendBtn.addEventListener("click", streamChat);
    inputEl.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" && !ev.shiftKey) {
        ev.preventDefault();
        streamChat();
      }
    });

    loadModels();
  </script>
</body>
</html>
